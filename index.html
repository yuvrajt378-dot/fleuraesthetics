<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleur Aesthetics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
  <h1>FLEUR OFFICIAL</h1>
</div>

<!-- NAV -->
<nav class="nav">
  <h2>Fleur</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <span onclick="openCart()">Cart (<span id="cart-count">0</span>)</span>
    <button onclick="toggleTheme()" class="theme-toggle">🌙</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Fleur Aesthetics</h1>
  <p>Let your skin bloom 🌸</p>
</section>

<div class="bottom-buttons">
  <a href="shop.html"><button class="premium-btn">Shop Now</button></a>
  <a href="https://instagram.com/_fleur.official_" target="_blank">
    <button class="outline-btn">Instagram</button>
  </a>
</div>

<!-- CART -->
<div id="cartDrawer" class="cart-drawer">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <h4 id="total"></h4>
  <button onclick="checkout()">Order on WhatsApp</button>
</div>

<script src="script.js"></script>

<script>
window.onload = () => {
  const intro = document.getElementById("intro");
  intro.classList.add("show");

  setTimeout(() => intro.classList.add("hide"), 1800);
  setTimeout(() => intro.style.display = "none", 2400);
};
</script>

</body>
</html>
